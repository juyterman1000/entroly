# Ruff configuration for Entroly
# We support Python 3.10+ but some type annotations use Dict/List/Optional
# from typing module for broader compatibility.

[lint]
select = ["E", "F", "W"]
ignore = [
    "UP006",   # Use `dict` instead of `Dict` — we keep typing.Dict for 3.9 compat
    "UP007",   # Use `X | Y` instead of `Union[X, Y]`
    "UP035",   # Import from `collections.abc` instead of `typing`
    "UP045",   # Use `X | None` instead of `Optional[X]`
    "E501",    # Line too long — we use descriptive print strings
    "F401",    # Unused import — some are used conditionally
    "E722",    # Bare except — used intentionally for resilient CLI
    "W605",    # Invalid escape sequence — some are in regex patterns
]

[lint.per-file-ignores]
"tests/*" = ["F811"]  # Redefined names in test fixtures
