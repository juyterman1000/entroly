[build-system]
# Pin: hatchling >=1.28 emits Metadata-Version 2.5, which PyPI's upload
# validator (twine/pkginfo in gh-action-pypi-publish) rejects as invalid.
# 1.27.x emits the accepted 2.4 (PEP 639 license-expression metadata).
requires = ["hatchling>=1.27,<1.28"]
build-backend = "hatchling.build"

[project]
name = "entroly"
version = "1.0.22"

description = "Auditable context control plane for AI agents: Context Receipts, MCP tools, local optimization, and SDK helpers."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
logo = { file = "docs/assets/logo.png", content-type = "image/png" }
requires-python = ">=3.10"
authors = [
    { name = "entroly", email = "fastrunner10090@gmail.com" },
]
keywords = [
    "context-receipts", "context-control-plane", "token-saving", "context-compression", "reduce-llm-costs", "llm-proxy",
    "mcp", "agentic-ai", "cursor", "claude-code", "copilot", "llm",
    "knapsack", "entropy", "context-optimization", "token-reduction"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "mcp>=1.6.0,<2",
    # Native Rust engine — kept as a base dependency so `pip install entroly`
    # gives users the fast engine by default. publish-core-wheels.yml ships
    # abi3 wheels for linux x86_64/aarch64, macOS universal2, and Windows, so
    # this resolves on all mainstream platforms. The pure-Python fallback
    # surface (SDK/MCP with the engine absent) is still supported and CI-tested
    # by installing with `pip install --no-deps` — see the "Pure-Python
    # Fallback" job in .github/workflows/ci.yml. Do not remove this without
    # updating that job; removing it silently downgrades every default install
    # to pure-Python.
    "entroly-core>=1.0.22,<2",
]

[project.optional-dependencies]
proxy = [
    "httpx>=0.27",
    "starlette>=0.37",
    "uvicorn>=0.30",
]
native = [
    "entroly-core>=1.0.22,<2",
]
full = [
    "entroly-core>=1.0.22,<2",
    "httpx>=0.27",
    "starlette>=0.37",
    "uvicorn>=0.30",
]

[project.urls]
Homepage = "https://github.com/juyterman1000/entroly"
Documentation = "https://github.com/juyterman1000/entroly#readme"
Repository = "https://github.com/juyterman1000/entroly"
"Bug Tracker" = "https://github.com/juyterman1000/entroly/issues"

[project.scripts]
entroly = "entroly._rust_launcher:main"
entroly-py = "entroly.cli:main"
entroly-docker = "entroly._docker_launcher:launch"

[tool.hatch.build.targets.wheel]
packages = ["entroly"]

[tool.hatch.build.targets.sdist]
exclude = [
    "/bench/_*",
    "/bench/*.log",
    "/bench/*_result.json",
    "/bench/swebench_forensics.py",
    "/bench/swebench_s7_engine_s6.json",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
