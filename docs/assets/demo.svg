<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Entroly context workflow</title>
  <desc id="desc">An illustrative flow from repository evidence through budgeted selection to an auditable context receipt. No benchmark values are shown.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#17142c"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#67e8f9"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e5e7eb}.mono{font-family:JetBrains Mono,Consolas,monospace}.muted{fill:#94a3b8}.label{font-size:13px;letter-spacing:.08em;text-transform:uppercase}.body{font-size:16px}.title{font-size:28px;font-weight:700}.card{fill:#111827;stroke:#334155;stroke-width:1.2}.chip{fill:#172033;stroke:#475569}.accent{fill:#67e8f9}.good{fill:#86efac}
    </style>
  </defs>
  <rect width="900" height="520" rx="20" fill="url(#bg)"/>
  <rect x="24" y="24" width="852" height="472" rx="16" fill="#0f172a" stroke="#334155"/>
  <circle cx="50" cy="50" r="6" fill="#fb7185"/><circle cx="70" cy="50" r="6" fill="#fbbf24"/><circle cx="90" cy="50" r="6" fill="#4ade80"/>
  <text x="120" y="56" class="ui mono muted" font-size="13">entroly demo · illustrative workflow</text>
  <text x="48" y="112" class="ui title">Put the right evidence inside the budget.</text>
  <text x="48" y="140" class="ui body muted">Then expose exactly what was selected, omitted, and recoverable.</text>

  <g transform="translate(48 184)">
    <rect class="card" width="226" height="190" rx="14"/>
    <text x="18" y="30" class="ui label muted">1 · Repository evidence</text>
    <rect x="18" y="50" width="190" height="27" rx="7" class="chip"/><text x="31" y="69" class="ui mono body">auth/service.py</text>
    <rect x="18" y="87" width="190" height="27" rx="7" class="chip"/><text x="31" y="106" class="ui mono body">auth/policy.py</text>
    <rect x="18" y="124" width="190" height="27" rx="7" class="chip"/><text x="31" y="143" class="ui mono body">tests/test_auth.py</text>
    <text x="18" y="174" class="ui body muted">Indexed locally</text>
  </g>

  <path d="M286 279H326" stroke="url(#accent)" stroke-width="3"/><path d="M318 271l10 8-10 8" fill="none" stroke="#a78bfa" stroke-width="3"/>

  <g transform="translate(338 184)">
    <rect class="card" width="226" height="190" rx="14"/>
    <text x="18" y="30" class="ui label muted">2 · Budgeted selection</text>
    <text x="18" y="67" class="ui mono body accent">query → ranked evidence</text>
    <rect x="18" y="88" width="190" height="9" rx="4.5" fill="#253047"/><rect x="18" y="88" width="132" height="9" rx="4.5" fill="url(#accent)"/>
    <text x="18" y="124" class="ui body">Full · Skeleton · Reference</text>
    <text x="18" y="153" class="ui body muted">Explicit token budget</text>
    <text x="18" y="176" class="ui body muted">Dependency-aware scoring</text>
  </g>

  <path d="M576 279H616" stroke="url(#accent)" stroke-width="3"/><path d="M608 271l10 8-10 8" fill="none" stroke="#a78bfa" stroke-width="3"/>

  <g transform="translate(628 184)">
    <rect class="card" width="224" height="190" rx="14"/>
    <text x="18" y="30" class="ui label muted">3 · Context receipt</text>
    <text x="18" y="67" class="ui body good">✓ included evidence</text>
    <text x="18" y="98" class="ui body">○ omitted evidence</text>
    <text x="18" y="129" class="ui body">↻ recovery handles</text>
    <text x="18" y="160" class="ui body"># content hashes</text>
    <text x="18" y="181" class="ui body muted">Auditable by the caller</text>
  </g>

  <rect x="48" y="414" width="804" height="50" rx="10" fill="#111827" stroke="#334155"/>
  <text x="67" y="445" class="ui mono body"><tspan class="accent">$ entroly demo</tspan><tspan class="muted">  # run locally for workload-specific measurements</tspan></text>
  <text x="852" y="489" text-anchor="end" class="ui muted" font-size="11">Illustrative UI · not a benchmark or billing claim</text>
</svg>
