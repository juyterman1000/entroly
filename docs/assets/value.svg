<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" role="img" aria-labelledby="title desc">
  <title id="title">How Entroly creates measurable context value</title>
  <desc id="desc">A capability diagram showing budgeted context, provenance, recovery, and verified outcomes. Results must be measured per workload.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#1e1b4b"/></linearGradient><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e2e8f0}.m{fill:#94a3b8}.h{font-size:24px;font-weight:700}.b{font-size:15px}.k{font-size:12px;letter-spacing:.08em}.c{fill:#111827;stroke:#475569}.a{fill:#67e8f9}.g{fill:#86efac}</style></defs>
  <rect width="860" height="340" rx="18" fill="url(#bg)"/>
  <text x="34" y="48" class="t h">From more context to better-controlled context</text>
  <text x="34" y="73" class="t b m">Each capability emits evidence the user can inspect; none is a universal quality or savings guarantee.</text>
  <g transform="translate(34 104)"><rect width="188" height="150" rx="12" class="c"/><text x="16" y="27" class="t k m">SELECT</text><text x="16" y="59" class="t b a">Budgeted evidence</text><text x="16" y="88" class="t b">Query relevance</text><text x="16" y="113" class="t b">Dependencies</text><text x="16" y="138" class="t b">Variable resolution</text></g>
  <g transform="translate(235 104)"><rect width="188" height="150" rx="12" class="c"/><text x="16" y="27" class="t k m">PROVE</text><text x="16" y="59" class="t b a">Context receipts</text><text x="16" y="88" class="t b">Source hashes</text><text x="16" y="113" class="t b">Omitted evidence</text><text x="16" y="138" class="t b">Decision trace</text></g>
  <g transform="translate(436 104)"><rect width="188" height="150" rx="12" class="c"/><text x="16" y="27" class="t k m">RECOVER</text><text x="16" y="59" class="t b a">Bounded handles</text><text x="16" y="88" class="t b">Captured content</text><text x="16" y="113" class="t b">Retention policy</text><text x="16" y="138" class="t b">Tamper checks</text></g>
  <g transform="translate(637 104)"><rect width="189" height="150" rx="12" class="c"/><text x="16" y="27" class="t k m">LEARN</text><text x="16" y="59" class="t b g">Verified outcomes</text><text x="16" y="88" class="t b">Request binding</text><text x="16" y="113" class="t b">Candidate gates</text><text x="16" y="138" class="t b">Safe rollback</text></g>
  <rect x="34" y="276" width="792" height="38" rx="9" fill="#111827" stroke="#334155"/><text x="52" y="301" class="t b"><tspan class="g">Measure:</tspan> source tokens · selected tokens · answer metrics · latency · provider cost</text>
</svg>
