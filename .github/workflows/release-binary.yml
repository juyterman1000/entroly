name: Release Binary (entroly-rs)

# Builds the standalone single-binary proxy for each platform and attaches the
# artifacts to the GitHub Release for the tag. Triggered by the same
# coordinated Entroly release workflow after its release and quality gates.
#
# Native builds only: entroly-core links pyo3, which needs libpython at build
# time, so cross-compilation is impractical. Each target is built on a matching
# native runner with Python set up. (linux-aarch64 is a documented follow-on.)

on:
  workflow_call:
    inputs:
      tag:
        description: Existing GitHub Release tag to attach binaries to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: macos-15-intel, target: x86_64-apple-darwin,     ext: "" }
          - { os: macos-14,      target: aarch64-apple-darwin,     ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,  ext: ".exe" }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        # pyo3 needs libpython at link time for the binary (extension-module
        # feature is off here).
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          SEMVER_RE='^entroly-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          if [[ ! "$RELEASE_TAG" =~ $SEMVER_RE ]]; then
            echo "Invalid coordinated release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build entroly-rs (--features proxy)
        working-directory: entroly-core
        run: cargo build --release --bin entroly-rs --features proxy --target ${{ matrix.target }}

      - name: Smoke test entroly-rs CLI
        run: python scripts/binary_cli_smoke.py "entroly-core/target/${{ matrix.target }}/release/entroly-rs${{ matrix.ext }}"

      - name: Package
        shell: bash
        run: |
          bin="entroly-core/target/${{ matrix.target }}/release/entroly-rs${{ matrix.ext }}"
          name="entroly-rs-${{ matrix.target }}"
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$bin" "dist/entroly-rs.exe"
            (cd dist && 7z a "${name}.zip" "entroly-rs.exe")
            rm "dist/entroly-rs.exe"
            archive="dist/${name}.zip"
          else
            tar -czf "dist/${name}.tar.gz" -C "entroly-core/target/${{ matrix.target }}/release" "entroly-rs"
            archive="dist/${name}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
          ls -la dist

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist/*
