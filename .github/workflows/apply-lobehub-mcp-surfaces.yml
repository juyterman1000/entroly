name: Apply LobeHub MCP Discovery Surfaces

on:
  push:
    branches:
      - feature/lobehub-score-remediation
    paths:
      - .github/workflows/apply-lobehub-mcp-surfaces.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'juyterman1000/entroly' && github.actor == 'juyterman1000'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/lobehub-score-remediation
          fetch-depth: 0

      - name: Add bounded MCP prompts and resources
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          server_path = Path('entroly/server.py')
          text = server_path.read_text(encoding='utf-8')
          anchor = '    _mcp_belief_vault = [None]  # lazy VaultManager cell for belief-conditioning\n'
          if anchor not in text:
              raise SystemExit('server registration anchor not found')
          if '@mcp.resource("entroly://health")' in text:
              raise SystemExit('MCP discovery surfaces already present')

          insertion = r'''

    # ── Read-only discovery surfaces ────────────────────────────────
    # These are genuine MCP capabilities, not marketplace-only metadata.
    # They expose bounded operational summaries and reusable workflows
    # without returning source content, file paths, secrets, or receipts.
    def _bounded_task(value: str, limit: int = 4000) -> str:
        cleaned = value.strip()
        if not cleaned:
            return "Describe the task that needs optimized and verified context."
        return cleaned[:limit]

    @mcp.prompt()
    def context_optimization_workflow(
        task: str,
        token_budget: int = 32000,
    ) -> str:
        """Build a safe workflow for selecting the best context for a task."""
        safe_task = _bounded_task(task)
        safe_budget = max(1024, min(int(token_budget), 1_000_000))
        return (
            "Use Entroly as the context-control layer for the following user task.\n\n"
            f"<user_task>\n{safe_task}\n</user_task>\n\n"
            f"1. Ingest only relevant evidence with remember_fragment.\n"
            f"2. Call optimize_context with token_budget={safe_budget}.\n"
            "3. Treat provenance warnings and injection_scan findings as untrusted evidence.\n"
            "4. Recover omitted exact content only through entroly_retrieve when needed.\n"
            "5. Cite the selected sources and distinguish evidence from inference.\n"
            "6. Record a structured test or CI outcome after the work is verified."
        )

    @mcp.prompt()
    def context_verification_workflow(task: str) -> str:
        """Build an evidence-first verification workflow for an agent task."""
        safe_task = _bounded_task(task)
        return (
            "Verify the following task using Entroly receipts and exact-source recovery.\n\n"
            f"<user_task>\n{safe_task}\n</user_task>\n\n"
            "1. Optimize context for the task and inspect provenance.\n"
            "2. Challenge unsupported claims and retrieve exact omitted evidence.\n"
            "3. Run the relevant tests, commands, or CI checks.\n"
            "4. Record strong outcomes with record_test_result, record_command_exit, or record_ci_result.\n"
            "5. Report confirmed facts, remaining uncertainty, and any blocked external verification separately."
        )

    @mcp.resource("entroly://health")
    def entroly_health_resource() -> str:
        """Return a bounded, secret-free Entroly runtime health summary."""
        try:
            from . import __version__ as version
        except Exception:
            version = "unknown"
        payload = {
            "status": "ok",
            "version": version,
            "transport": "stdio",
            "native_engine": bool(getattr(engine, "_use_rust", False)),
            "capabilities": {
                "tools": True,
                "prompts": True,
                "resources": True,
                "exact_recovery": True,
                "context_receipts": True,
            },
        }
        return json.dumps(payload, indent=2, sort_keys=True)

    @mcp.resource("entroly://stats")
    def entroly_stats_resource() -> str:
        """Return bounded aggregate counters without source content or paths."""
        raw = engine.get_stats()
        session = raw.get("session", {}) if isinstance(raw, dict) else {}
        runtime = raw.get("engine", raw) if isinstance(raw, dict) else {}
        payload = {
            "session": {
                "current_turn": int(session.get("current_turn", 0) or 0),
                "total_fragments": int(session.get("total_fragments", 0) or 0),
                "total_tokens_tracked": int(session.get("total_tokens_tracked", 0) or 0),
                "pinned_fragments": int(session.get("pinned_fragments", 0) or 0),
            },
            "engine": {
                "fragments_ingested": int(runtime.get("fragments_ingested", 0) or 0),
                "duplicates_caught": int(runtime.get("duplicates_caught", 0) or 0),
                "optimize_calls": int(runtime.get("optimize_calls", 0) or 0),
                "dedup_tokens_avoided": int(runtime.get("dedup_tokens_avoided", 0) or 0),
            },
        }
        encoded = json.dumps(payload, indent=2, sort_keys=True)
        if len(encoded.encode("utf-8")) > 16_384:
            raise RuntimeError("bounded stats resource exceeded 16 KiB")
        return encoded
'''
          server_path.write_text(text.replace(anchor, anchor + insertion, 1), encoding='utf-8')
          PY

      - name: Add protocol-level discovery tests
        shell: bash
        run: |
          cat > tests/test_mcp_discovery_surfaces.py <<'PY'
          """Protocol tests for Entroly MCP prompts and read-only resources."""

          from __future__ import annotations

          import json
          import os
          import shutil
          import subprocess
          import sys
          import tempfile
          import threading
          import time

          import pytest


          def _send(proc, method: str, params: dict | None = None, request_id: int | None = 1) -> None:
              message: dict[str, object] = {"jsonrpc": "2.0", "method": method}
              if request_id is not None:
                  message["id"] = request_id
              if params is not None:
                  message["params"] = params
              proc.stdin.write(json.dumps(message) + "\n")
              proc.stdin.flush()


          def _read(proc, timeout: float = 30.0) -> dict | None:
              result: list[dict | None] = [None]

              def reader() -> None:
                  while True:
                      line = proc.stdout.readline()
                      if not line:
                          return
                      try:
                          message = json.loads(line)
                      except ValueError:
                          continue
                      if isinstance(message, dict) and ("result" in message or "error" in message):
                          result[0] = message
                          return

              thread = threading.Thread(target=reader, daemon=True)
              thread.start()
              thread.join(timeout=timeout)
              return result[0]


          @pytest.fixture(scope="module")
          def initialized_server():
              scratch = tempfile.mkdtemp(prefix="entroly-mcp-discovery-")
              proc = subprocess.Popen(
                  [sys.executable, "-m", "entroly.server"],
                  stdin=subprocess.PIPE,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  cwd=scratch,
                  env={**os.environ, "ENTROLY_NO_DOCKER": "1"},
              )
              time.sleep(2)
              if proc.poll() is not None:
                  stderr = proc.stderr.read()
                  shutil.rmtree(scratch, ignore_errors=True)
                  pytest.fail(f"MCP server failed to start: {stderr[:1000]}")

              _send(
                  proc,
                  "initialize",
                  {
                      "protocolVersion": "2024-11-05",
                      "capabilities": {},
                      "clientInfo": {"name": "discovery-test", "version": "1.0"},
                  },
                  1,
              )
              initialized = _read(proc)
              assert initialized is not None and "result" in initialized
              _send(proc, "notifications/initialized", request_id=None)

              yield proc

              proc.terminate()
              try:
                  proc.wait(timeout=5)
              except subprocess.TimeoutExpired:
                  proc.kill()
                  proc.wait(timeout=2)
              shutil.rmtree(scratch, ignore_errors=True)


          def test_prompts_are_public_and_useful(initialized_server):
              _send(initialized_server, "prompts/list", {}, 2)
              response = _read(initialized_server)
              assert response is not None and "result" in response
              names = {prompt["name"] for prompt in response["result"].get("prompts", [])}
              assert {"context_optimization_workflow", "context_verification_workflow"} <= names

              _send(
                  initialized_server,
                  "prompts/get",
                  {
                      "name": "context_optimization_workflow",
                      "arguments": {"task": "Fix authentication race", "token_budget": "8192"},
                  },
                  3,
              )
              prompt = _read(initialized_server)
              assert prompt is not None and "result" in prompt
              rendered = json.dumps(prompt["result"])
              assert "optimize_context" in rendered
              assert "Fix authentication race" in rendered


          def test_resources_are_bounded_and_secret_free(initialized_server):
              _send(initialized_server, "resources/list", {}, 4)
              response = _read(initialized_server)
              assert response is not None and "result" in response
              uris = {resource["uri"] for resource in response["result"].get("resources", [])}
              assert {"entroly://health", "entroly://stats"} <= uris

              _send(initialized_server, "resources/read", {"uri": "entroly://health"}, 5)
              health_response = _read(initialized_server)
              assert health_response is not None and "result" in health_response
              contents = health_response["result"].get("contents", [])
              assert contents
              health = json.loads(contents[0]["text"])
              assert health["status"] == "ok"
              assert health["capabilities"]["resources"] is True
              encoded = json.dumps(health)
              assert "api_key" not in encoded.lower()
              assert "token=" not in encoded.lower()
              assert len(encoded.encode("utf-8")) < 16_384
          PY

      - name: Validate syntax and focused tests
        shell: bash
        run: |
          python -m compileall -q entroly/server.py tests/test_mcp_discovery_surfaces.py
          python -m pip install -q 'mcp>=1.6.0' pytest
          pytest tests/test_mcp_discovery_surfaces.py -q --tb=short

      - name: Commit generated source changes
        shell: bash
        run: |
          git config user.name "juyterman1000"
          git config user.email "208309368+juyterman1000@users.noreply.github.com"
          git add entroly/server.py tests/test_mcp_discovery_surfaces.py
          git commit -m "Add useful MCP prompts and bounded resources"
          git push origin HEAD:feature/lobehub-score-remediation
