name: Apply ELC Native Proxy Patch

on:
  push:
    paths:
      - ".github/workflows/apply-elc-native-proxy-patch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-elc-native-proxy-patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply deterministic patch
        run: python scripts/apply_elc_native_and_proxy_patch.py

      - name: Show diff
        run: git diff -- entroly-core/src/lib.rs entroly/proxy.py

      - name: Validate patch targets changed
        run: |
          git diff --quiet -- entroly-core/src/lib.rs entroly/proxy.py && {
            echo "No lib.rs/proxy.py changes produced by patcher" >&2
            exit 1
          }

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entroly-core/src/lib.rs entroly/proxy.py
          git commit -m "Wire native ELC into core and proxy"
          git push
