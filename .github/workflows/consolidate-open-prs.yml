name: Consolidate Open PR Fixes

on:
  push:
    branches:
      - agent/consolidate-open-prs

permissions:
  contents: write

jobs:
  consolidate:
    if: >-
      github.actor == 'juyterman1000' &&
      github.event.head_commit.message == 'Bootstrap consolidated remediation'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Import the reviewed Context Efficiency Frontier implementation
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            '+refs/heads/codex/context-efficiency-frontier:refs/remotes/origin/codex/context-efficiency-frontier'

          for path in \
            benchmarks/context_efficiency_frontier.py \
            benchmarks/context_efficiency_report.py \
            benchmarks/context_efficiency_trial.schema.json \
            docs/benchmarks/context-efficiency-frontier.md \
            tests/test_context_efficiency_frontier.py
          do
            mkdir -p "$(dirname "$path")"
            git show "origin/codex/context-efficiency-frontier:$path" > "$path"
          done

      - name: Apply current-main documentation and MCP registry fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          heading = '**Context Efficiency Frontier research:**'
          block = '''**Context Efficiency Frontier research:** Entroly includes a paired,
          model-neutral benchmark for the question token-savings tables cannot answer:
          does less context preserve real task quality? The preregistered protocol
          compares raw context, model-native compaction, Entroly, and their combination
          using provider-observed tokens, cost, latency, task success, evidence recall,
          and unsupported claims.

          [Read the preregistered protocol](docs/benchmarks/context-efficiency-frontier.md).
          No headline result is claimed until the paired confidence bounds pass.'''
          anchor = 'Every number below is reproducible and backed by a committed JSON artifact you can audit — not a screenshot.'
          if heading not in text:
              if anchor not in text:
                  raise SystemExit('README benchmark insertion anchor is missing')
              text = text.replace(anchor, block + '\n\n' + anchor, 1)
              readme.write_text(text, encoding='utf-8')

          server_path = Path('server.json')
          server = json.loads(server_path.read_text(encoding='utf-8'))
          server['description'] = (
              'Local context OS for AI agents with token optimization, receipts, memory, and verification.'
          )
          server_path.write_text(json.dumps(server, indent=2) + '\n', encoding='utf-8')

          pyproject = Path('pyproject.toml')
          project_text = pyproject.read_text(encoding='utf-8')
          updated = project_text.replace(
              'requires = ["hatchling>=1.27,<1.31"]',
              'requires = ["hatchling>=1.27,<1.32"]',
              1,
          )
          if updated == project_text:
              raise SystemExit('hatchling build requirement was not updated')
          pyproject.write_text(updated, encoding='utf-8')
          PY

          cat > tests/test_mcp_registry_manifest.py <<'PYTEST'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path


          ROOT = Path(__file__).resolve().parents[1]
          CANONICAL_NAME = "io.github.juyterman1000/entroly"
          CANONICAL_REPOSITORY = "https://github.com/juyterman1000/entroly"
          SCHEMA = "https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json"


          def _json(path: str) -> dict:
              return json.loads((ROOT / path).read_text(encoding="utf-8"))


          def _project_value(name: str) -> str:
              text = (ROOT / "pyproject.toml").read_text(encoding="utf-8")
              match = re.search(rf'(?m)^{re.escape(name)}\s*=\s*"([^"]+)"', text)
              assert match is not None, f"missing {name} in pyproject.toml"
              return match.group(1)


          def test_mcp_registry_manifest_respects_schema_bounds() -> None:
              manifest = _json("server.json")

              assert manifest["$schema"] == SCHEMA
              assert 3 <= len(manifest["name"]) <= 200
              assert 1 <= len(manifest["title"]) <= 100
              assert 1 <= len(manifest["description"]) <= 100
              assert 1 <= len(manifest["version"]) <= 255


          def test_mcp_registry_identity_and_package_contract() -> None:
              manifest = _json("server.json")
              version = _project_value("version")

              assert manifest["name"] == CANONICAL_NAME
              assert manifest["websiteUrl"] == CANONICAL_REPOSITORY
              assert manifest["repository"] == {
                  "url": CANONICAL_REPOSITORY,
                  "source": "github",
              }
              assert manifest["version"] == version

              packages = {
                  (package["registryType"], package["identifier"]): package
                  for package in manifest["packages"]
              }
              assert set(packages) == {
                  ("pypi", "entroly"),
                  ("npm", "entroly-mcp"),
              }
              expected_runtime = {
                  ("pypi", "entroly"): "uvx",
                  ("npm", "entroly-mcp"): "npx",
              }
              for key, package in packages.items():
                  assert package["version"] == version
                  assert package["runtimeHint"] == expected_runtime[key]
                  assert package["transport"] == {"type": "stdio"}
                  assert package["packageArguments"] == [
                      {"type": "positional", "value": "serve"}
                  ]


          def test_registry_package_ownership_proofs_are_canonical() -> None:
              assert _project_value("readme") == "PYPI_README.md"
              pypi_description = (ROOT / "PYPI_README.md").read_text(encoding="utf-8")
              assert f"mcp-name: {CANONICAL_NAME}" in pypi_description

              npm = _json("entroly/npm/package.json")
              assert npm["name"] == "entroly-mcp"
              assert npm["mcpName"] == CANONICAL_NAME
              assert npm["repository"]["url"].removesuffix(".git") == CANONICAL_REPOSITORY
          PYTEST

      - name: Refresh Rust regex lockfiles deterministically
        shell: bash
        run: |
          set -euo pipefail
          for manifest in \
            entroly-core/Cargo.toml \
            entroly-qccr/Cargo.toml \
            entroly-wasm/Cargo.toml
          do
            lock="$(dirname "$manifest")/Cargo.lock"
            if grep -q '^name = "regex"$' "$lock"; then
              cargo update --manifest-path "$manifest" -p regex --precise 1.13.0
            fi
          done

      - name: Validate consolidated changes
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pytest ruff
          python -m pytest \
            tests/test_mcp_registry_manifest.py \
            tests/test_context_efficiency_frontier.py \
            tests/test_release_surface.py \
            -q
          python -m ruff check \
            benchmarks/context_efficiency_frontier.py \
            benchmarks/context_efficiency_report.py \
            tests/test_context_efficiency_frontier.py \
            tests/test_mcp_registry_manifest.py
          cargo test --manifest-path entroly-core/Cargo.toml --lib --locked

      - name: Commit as canonical repository owner
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "juyterman1000"
          git config user.email "208309368+juyterman1000@users.noreply.github.com"

          git add \
            README.md \
            server.json \
            pyproject.toml \
            benchmarks/context_efficiency_frontier.py \
            benchmarks/context_efficiency_report.py \
            benchmarks/context_efficiency_trial.schema.json \
            docs/benchmarks/context-efficiency-frontier.md \
            tests/test_context_efficiency_frontier.py \
            tests/test_mcp_registry_manifest.py \
            entroly-core/Cargo.lock \
            entroly-qccr/Cargo.lock \
            entroly-wasm/Cargo.lock

          git diff --cached --check
          git commit -m "Consolidate MCP, dependency, and frontier fixes"
          git push origin HEAD:agent/consolidate-open-prs
