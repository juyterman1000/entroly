name: Build and Push Entroly Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'entroly-v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to publish manually, for example 1.0.25. Leave blank for Docker-only run.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/entroly

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=entroly-v(.*),group=1
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.entroly
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Ruff lint
        run: |
          python -m pip install ruff==0.12.9
          ruff check entroly/

      - name: Build entroly-core + install package
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin --timeout 120 --retries 5
          cd entroly-core && ../.venv/bin/maturin develop --release && cd ..
          .venv/bin/pip install --timeout 120 --retries 5 -e . \
            "mcp>=1.6.0" "httpx>=0.27" "starlette>=0.37" \
            "uvicorn>=0.30" psutil pytest pytest-timeout

      - name: Test suite
        run: .venv/bin/pytest tests/ -q --tb=short -x --timeout=60

  # Build and publish the native dependency in this release run. Tags created
  # with GITHUB_TOKEN do not start a second workflow, so relying on a tag-only
  # core workflow can leave the public Python package uninstallable.
  publish-core:
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    uses: ./.github/workflows/publish-core-wheels.yml
    secrets: inherit

  publish-pypi:
    needs: [build-and-push, quality-gate, publish-core]
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Extract release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          elif [[ "$GITHUB_REF" == refs/tags/entroly-v* ]]; then
            VERSION="${GITHUB_REF_NAME#entroly-v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml

      - name: Build PyPI package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.TESTING_API_TOKEN }}

  publish-npm:
    needs: [build-and-push, quality-gate]
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust + wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          cargo install wasm-pack

      - name: Build Wasm package
        working-directory: entroly-wasm
        run: |
          source ~/.cargo/env
          wasm-pack build --target nodejs --out-dir pkg

      - name: Extract release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          elif [[ "$GITHUB_REF" == refs/tags/entroly-v* ]]; then
            VERSION="${GITHUB_REF_NAME#entroly-v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        working-directory: entroly-wasm
        run: |
          node -e "const p=require('./package.json'); p.version='${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish to npm
        working-directory: entroly-wasm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.VERSION }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.latest_token }}

  publish-npm-mcp:
    needs: [build-and-push, quality-gate]
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          elif [[ "$GITHUB_REF" == refs/tags/entroly-v* ]]; then
            VERSION="${GITHUB_REF_NAME#entroly-v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        working-directory: entroly/npm
        run: |
          node -e "const p=require('./package.json'); p.version='${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish entroly-mcp to npm
        working-directory: entroly/npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.VERSION }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.latest_token }}

  publish-npm-alias:
    needs: [build-and-push, quality-gate, publish-npm]
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
          elif [[ "$GITHUB_REF" == refs/tags/entroly-v* ]]; then
            VERSION="${GITHUB_REF_NAME#entroly-v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        working-directory: entroly/npm-alias
        run: |
          node -e "const fs=require('fs'); const p=require('./package.json'); p.version='${{ steps.version.outputs.VERSION }}'; p.dependencies['entroly-wasm']='${{ steps.version.outputs.VERSION }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish entroly alias to npm
        working-directory: entroly/npm-alias
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.VERSION }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.latest_token }}

  publish-binaries:
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    uses: ./.github/workflows/release-binary.yml

  # The source release must not be blocked by external package registries.
  # PyPI/npm remain quality-gated independently and are idempotent.
  github-release:
    if: startsWith(github.ref, 'refs/tags/entroly-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '') || (github.event_name == 'push' && (startsWith(github.event.head_commit.message, 'Release v') || startsWith(github.event.head_commit.message, 'Release ')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
            TAG="entroly-v${VERSION}"
          elif [[ "$GITHUB_REF" == refs/tags/entroly-v* ]]; then
            VERSION="${GITHUB_REF_NAME#entroly-v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            TAG="entroly-v${VERSION}"
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; skipping."
          else
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --target "${GITHUB_SHA}" \
              --generate-notes
          fi
