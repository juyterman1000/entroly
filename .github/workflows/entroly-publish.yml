name: Build and Push Entroly Docker Image

on:
  push:
    branches: [main]          # auto-build :latest on every push to main
    tags:
      - 'entroly-v*'          # versioned image on release tags
  workflow_dispatch:           # allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/entroly

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On a version tag → push versioned + latest
            type=match,pattern=entroly-v(.*),group=1
            # Always push :latest (covers both branch pushes and tags)
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.entroly
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gate:
    # RELEASE SAFETY GATE (audit P0-4). ci.yml does NOT run on tags, so
    # a tag previously published to PyPI/npm gated only on a Docker
    # build — a failing ruff/pytest still shipped. This self-contained
    # gate mirrors ci.yml's known-good install and MUST pass before any
    # publish job runs. Fail-closed: a red gate blocks the release.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ruff lint (pinned, identical to CI)
        run: |
          python -m pip install ruff==0.12.9
          ruff check entroly/

      - name: Build entroly-core + install package (mirrors ci.yml)
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin --timeout 120 --retries 5
          cd entroly-core && ../.venv/bin/maturin develop --release && cd ..
          .venv/bin/pip install --timeout 120 --retries 5 -e . \
            "mcp>=1.6.0" "httpx>=0.27" "starlette>=0.37" \
            "uvicorn>=0.30" psutil pytest pytest-timeout

      - name: Test suite (fail-fast gate)
        run: .venv/bin/pytest tests/ -q --tb=short -x --timeout=60

  publish-pypi:
    needs: [build-and-push, quality-gate]
    # Only publish to PyPI when a version tag triggered the workflow
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#entroly-v}" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml

      - name: Build PyPI package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.TESTING_API_TOKEN }}

  publish-npm:
    needs: [build-and-push, quality-gate]
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust + wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          cargo install wasm-pack

      - name: Build Wasm package
        working-directory: entroly-wasm
        run: |
          source ~/.cargo/env
          wasm-pack build --target nodejs --out-dir pkg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#entroly-v}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        working-directory: entroly-wasm
        run: |
          node -e "const p=require('./package.json'); p.version='${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish to npm
        working-directory: entroly-wasm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TEST_NPM }}

  publish-npm-mcp:
    needs: [build-and-push, quality-gate]
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#entroly-v}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        working-directory: entroly/npm
        run: |
          node -e "const p=require('./package.json'); p.version='${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Publish entroly-mcp to npm
        working-directory: entroly/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TEST_NPM }}

  github-release:
    # The GitHub Releases page was frozen at v0.19.2 because nothing
    # here ever created a Release object — tags shipped to PyPI/npm but
    # never appeared under "Releases". This creates one automatically
    # for every tagged release, AFTER the quality gate AND all publishes
    # succeed, so a Release never advertises a version that failed to
    # ship. Auto-generated notes from commit history.
    needs: [quality-gate, publish-pypi, publish-npm, publish-npm-mcp]
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#entroly-v}"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "v${VERSION}" \
              --verify-tag \
              --generate-notes
          fi
