name: Apply Model Decision Receipt Patch

on:
  push:
    branches:
      - breakthrough/model-decision-receipts
    paths:
      - scripts/apply_model_decision_receipt_patch.py
      - .github/workflows/apply-model-decision-receipt-patch.yml

permissions:
  contents: write

concurrency:
  group: model-decision-receipt-patch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply guarded patch
        run: python scripts/apply_model_decision_receipt_patch.py

      - name: Commit integration
        shell: bash
        run: |
          if git diff --quiet -- entroly/control_plane.py; then
            echo "Receipt integration already present"
            exit 0
          fi
          git config user.name "juyterman1000"
          git config user.email "fastrunner10090@gmail.com"
          git add entroly/control_plane.py
          git commit -m "Integrate model decision receipts into control-plane headers"
          git push origin "HEAD:${GITHUB_REF_NAME}"
