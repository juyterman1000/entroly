name: Update Homebrew checksum 1.0.25

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PyPI source URL and checksum
        run: |
          set -euo pipefail
          cat > /tmp/resolve_pypi.py <<'PY'
          import json
          import os
          import urllib.request

          version = '1.0.25'
          url = f'https://pypi.org/pypi/entroly/{version}/json'
          with urllib.request.urlopen(url, timeout=30) as response:
              data = json.load(response)

          sources = [item for item in data.get('urls', []) if item.get('packagetype') == 'sdist']
          if not sources:
              raise SystemExit('No sdist found for entroly 1.0.25')

          source = sources[0]
          source_url = source['url']
          sha256 = source['digests']['sha256']

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env:
              env.write(f'URL={source_url}\n')
              env.write(f'SHA256={sha256}\n')

          print(f'URL={source_url}')
          print(f'SHA256={sha256}')
          PY
          python3 /tmp/resolve_pypi.py

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          cat > /tmp/update_formula.py <<'PY'
          import os
          from pathlib import Path

          path = Path('packaging/homebrew/entroly.rb')
          lines = []

          for line in path.read_text().splitlines():
              stripped = line.strip()
              indent = line[: len(line) - len(line.lstrip())]
              if stripped.startswith('url '):
                  lines.append(f'{indent}url "{os.environ["URL"]}"')
              elif stripped.startswith('sha256 '):
                  lines.append(f'{indent}sha256 "{os.environ["SHA256"]}"')
              else:
                  lines.append(line)

          path.write_text('\n'.join(lines) + '\n')
          PY
          python3 /tmp/update_formula.py
          grep -nE 'url |sha256 ' packaging/homebrew/entroly.rb

      - name: Commit formula update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/entroly.rb
          git diff --cached --quiet && echo "No Homebrew formula changes needed" && exit 0
          git commit -m "Update Homebrew formula checksum for 1.0.25"
          git push
