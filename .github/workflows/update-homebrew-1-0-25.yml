name: Update Homebrew checksum 1.0.25

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-homebrew-1-0-25.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PyPI source URL and checksum
        run: |
          set -euo pipefail
          VERSION="1.0.25"
          python - <<'PY'
          import json
          import os
          import urllib.request

          version = '1.0.25'
          with urllib.request.urlopen(f'https://pypi.org/pypi/entroly/{version}/json') as response:
              data = json.load(response)

          source_files = [item for item in data.get('urls', []) if item.get('packagetype') == 'sdist']
          if not source_files:
              raise SystemExit('No source distribution found for entroly 1.0.25 on PyPI')

          source = source_files[0]
          url = source['url']
          digest = source['digests']['sha256']

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env:
              env.write(f'URL={url}\n')
              env.write(f'SHA256={digest}\n')

          print(f'URL: {url}')
          print(f'SHA256: {digest}')
          PY

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path('packaging/homebrew/entroly.rb')
          text = path.read_text()
          lines = []
          for line in text.splitlines():
              stripped = line.strip()
              if stripped.startswith('url '):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines.append(f'{indent}url "{os.environ["URL"]}"')
              elif stripped.startswith('sha256 '):
                  indent = line[: len(line) - len(line.lstrip())]
                  lines.append(f'{indent}sha256 "{os.environ["SHA256"]}"')
              else:
                  lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit formula update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/entroly.rb
          git diff --cached --quiet && echo "No Homebrew formula changes needed" && exit 0
          git commit -m "Update Homebrew formula checksum for 1.0.25"
          git push
