name: Update Homebrew checksum 1.0.25

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve PyPI source URL and checksum
        run: |
          set -euo pipefail
          python -c "import json, os, urllib.request; data=json.load(urllib.request.urlopen('https://pypi.org/pypi/entroly/1.0.25/json')); s=[x for x in data['urls'] if x.get('packagetype')=='sdist'][0]; open(os.environ['GITHUB_ENV'],'a').write('URL='+s['url']+'\nSHA256='+s['digests']['sha256']+'\n'); print(s['url']); print(s['digests']['sha256'])"

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          python -c "from pathlib import Path; import os; p=Path('packaging/homebrew/entroly.rb'); lines=[]
          for line in p.read_text().splitlines():
              stripped=line.strip(); indent=line[:len(line)-len(line.lstrip())]
              if stripped.startswith('url '): lines.append(indent+'url \"'+os.environ['URL']+'\"')
              elif stripped.startswith('sha256 '): lines.append(indent+'sha256 \"'+os.environ['SHA256']+'\"')
              else: lines.append(line)
          p.write_text('\\n'.join(lines)+'\\n')"

      - name: Commit formula update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/entroly.rb
          git diff --cached --quiet && echo "No Homebrew formula changes needed" && exit 0
          git commit -m "Update Homebrew formula checksum for 1.0.25"
          git push
