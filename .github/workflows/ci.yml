name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIP_RETRIES: 10
  PIP_TIMEOUT: 120
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.12.9

      - name: Run ruff check
        run: ruff check entroly/

  memory-os:
    name: MemoryOS Production Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MemoryOS test surface without runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install pytest pytest-timeout --timeout 120 --retries 5

      - name: Run MemoryOS/Fabric tests
        run: pytest tests/test_memory_os.py tests/test_memory_cli.py tests/test_memory_launcher.py tests/test_memory_package_metadata.py tests/test_memory_stress_benchmark.py tests/test_memory_e2e_demo.py tests/test_memory_fabric.py tests/test_memory_fabric_benchmark.py tests/test_memory_fabric_e2e_demo.py -v --tb=short --timeout=60

      - name: Run MemoryOS stress benchmark
        run: python benchmarks/memory_stress_test.py --json

      - name: Run MemoryOS end-to-end demo
        run: python examples/memory_os_e2e_demo.py --json

      - name: Run Memory Fabric stress benchmark
        run: python benchmarks/memory_fabric_stress_test.py --json

      - name: Run Memory Fabric end-to-end demo
        run: python examples/memory_fabric_e2e_demo.py --json

  rust-tests:
    name: Rust Tests + Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: entroly-core

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up Python
        # pyo3 needs libpython at link time when the extension-module feature
        # is off (which it is for `cargo test --lib`).
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            entroly-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('entroly-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy (lint)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --lib

  proxy-binary:
    name: Single-Binary Proxy (--features proxy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            entroly-core/target
          key: ${{ runner.os }}-cargo-proxy-${{ hashFiles('entroly-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # The proxy server is behind the `proxy` feature, so the default
      # rust-tests job never compiles it. Build + lint + e2e it here so the
      # feature-gated code path cannot rot silently.
      - name: Clippy (proxy feature)
        working-directory: entroly-core
        run: cargo clippy --bin entroly-rs --features proxy -- -D warnings

      - name: Build proxy binary
        working-directory: entroly-core
        run: cargo build --release --bin entroly-rs --features proxy

      - name: CLI smoke test
        run: python scripts/binary_cli_smoke.py entroly-core/target/release/entroly-rs

      - name: Proxy end-to-end (compress + headers + SSE + concurrency)
        run: python scripts/proxy_e2e.py entroly-core/target/release/entroly-rs

  integration:
    name: Build Wheel + Functional Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install maturin and build entroly-core wheel
        run: |
          .venv/bin/pip install maturin --timeout 120 --retries 5
          cd entroly-core
          ../.venv/bin/maturin develop --release

      - name: Install entroly Python package
        run: |
          # maturin develop already installed entroly-core into the venv.
          # Install only the remaining runtime deps (mcp, httpx, starlette)
          # without re-resolving entroly-core from PyPI (0.3.0 isn't there yet).
          .venv/bin/pip install --timeout 120 --retries 5 -e . "mcp>=1.6.0" "httpx>=0.27" "starlette>=0.37" "uvicorn>=0.30" psutil

      - name: Verify imports
        run: |
          .venv/bin/python -c "from entroly_core import EntrolyEngine; print('rust engine ok')"
          .venv/bin/python -c "from entroly.server import EntrolyEngine; print('server ok')"
          .venv/bin/python -c "from entroly.cli import _detect_project_type; print('cli ok')"
          .venv/bin/python -c "from entroly.auto_index import _should_index; print('auto_index ok')"
          .venv/bin/python -c "from entroly.verifiers import trace_provenance, forge_loop; print('verifiers ok')"

      - name: Run functional test
        run: .venv/bin/python tests/functional_test.py

      - name: Run production edge-case test
        run: .venv/bin/python tests/test_production_e2e.py

      - name: Run Python tests
        run: |
          .venv/bin/pip install pytest pytest-timeout --timeout 120 --retries 5
          .venv/bin/pytest tests/ -v --tb=short -x --timeout=60

      - name: Run entroly-core integration tests
        run: |
          .venv/bin/python entroly-core/tests/test_integration.py
          .venv/bin/python entroly-core/tests/test_brutal.py

  python-fallback:
    # The 'integration' job always builds the Rust wheel, so it only ever
    # exercises the native path. But `pip install entroly` (no extras) ships
    # the PURE-PYTHON fallback — and that is what most users actually run.
    # That surface was untested in CI, which is exactly how an empty-output
    # bug in the Python compressor (tfidf IDF-degeneracy → "" → annihilated
    # prompt) shipped while every native-path test stayed green. This job
    # pins the base-install surface so that class of regression can't recur.
    name: Pure-Python Fallback (base `pip install entroly`, no Rust engine)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install entroly WITHOUT the native engine
        run: |
          # entroly-core IS a base dependency (users get the Rust engine by
          # default), so a plain `pip install -e .` pulls the engine once an
          # entroly-core wheel exists on PyPI — and this job would then test the
          # wrong surface. Install with --no-deps to genuinely exclude the
          # engine, then add exactly the runtime deps a real
          # `pip install entroly[proxy]` resolves (minus the native core).
          # Do NOT drop --no-deps.
          pip install --no-deps --timeout 120 --retries 5 -e .
          pip install --timeout 120 --retries 5 \
            "mcp>=1.6.0" "httpx>=0.27" "starlette>=0.37" "uvicorn>=0.30" psutil \
            pytest pytest-timeout

      - name: Assert the Rust engine is genuinely absent
        run: |
          # If entroly_core leaks in, this job would silently test the wrong
          # surface. Fail loudly instead.
          python - <<'PY'
          import importlib.util, sys
          if importlib.util.find_spec("entroly_core") is not None:
              sys.exit("entroly_core is importable — this job must test the "
                       "pure-Python fallback, not the native engine.")
          from entroly.server import EntrolyEngine
          assert EntrolyEngine()._use_rust is False, "engine claims Rust is active"
          print("confirmed: pure-Python fallback surface")
          PY

      - name: Run the pure-Python test surface
        run: |
          # Tests that hard-require the native engine (import entroly_core at
          # module load, or assert Rust-exact numerics/result shapes) are
          # excluded — they belong to the 'integration' job. Everything else,
          # including the compress()/universal_compress non-annihilation
          # contract, MUST pass on the base install.
          pytest tests/ -v --tb=short --timeout=60 -p no:cacheprovider \
            --ignore=tests/functional_test.py \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_ios.py \
            --ignore=tests/test_rust_cogops.py \
            --ignore=tests/test_deep_functional.py \
            --ignore=tests/test_engine_isolation.py \
            --ignore=tests/test_localization.py \
            --ignore=tests/test_benchmark_harness.py
