name: Finalize LobeHub Remediation Branch

on:
  pull_request:
    paths:
      - .github/scripts/add_lobehub_badge.py
      - .github/workflows/apply-lobehub-badge-pr.yml

permissions:
  contents: write

concurrency:
  group: finalize-lobehub-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.repository == 'juyterman1000/entroly' && github.head_ref == 'feature/lobehub-score-remediation'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
      ENTROLY_NO_DOCKER: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/lobehub-score-remediation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Entroly and focused validation dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -e . pytest

      - name: Add exact LobeHub ownership badge
        run: python .github/scripts/add_lobehub_badge.py

      - name: Validate real MCP capabilities and score evidence
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'https://lobehub.com/badge/mcp/juyterman1000-entroly' README.md
          python -m compileall -q entroly/server.py scripts/audit_lobehub_score.py tests/test_mcp_discovery_surfaces.py tests/test_lobehub_score_audit.py
          python -m pytest \
            tests/test_mcp_discovery_surfaces.py \
            tests/test_mcp_protocol.py \
            tests/test_lobehub_score_audit.py \
            -q --tb=short
          python scripts/audit_lobehub_score.py \
            --protocol-validated \
            --require-local-completeness \
            --output lobehub-readiness.json
          git diff --check

      - name: Commit durable changes and remove bootstrap helpers
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "juyterman1000"
          git config user.email "208309368+juyterman1000@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            .github/scripts/add_lobehub_badge.py \
            .github/workflows/apply-lobehub-badge-pr.yml \
            .github/workflows/inspect-lobehub-public.yml
          git add README.md
          git diff --cached --check
          git commit -m "Finalize LobeHub MCP discovery remediation"
          git push origin HEAD:feature/lobehub-score-remediation
