name: Entroly Context Index — Competitive Benchmark

on:
  pull_request:
    paths:
      - 'bench/**'
      - 'benchmarks/compression_gauntlet.py'
      - 'benchmarks/compression_frontier.py'
      - 'benchmarks/compression_proxy_scoreboard.py'
      - 'benchmarks/neural_evidence_frontier.py'
      - 'benchmarks/neural_query_shift.py'
      - 'benchmarks/results/compression_gauntlet.json'
      - 'benchmarks/results/compression_gauntlet.md'
      - 'benchmarks/results/compression_frontier.json'
      - 'benchmarks/results/compression_frontier.md'
      - 'benchmarks/results/neural_evidence_frontier.json'
      - 'benchmarks/results/neural_evidence_frontier.md'
      - 'benchmarks/results/neural_query_shift*.json'
      - 'benchmarks/results/neural_query_shift*.md'
      - 'entroly/**'
      - 'entroly-core/**'
      - 'tests/test_compression_gauntlet.py'
      - 'tests/test_compression_frontier.py'
      - 'tests/test_evidence_locked_compression.py'
      - 'tests/test_compression_proxy_scoreboard.py'
      - 'tests/test_neural_evidence_frontier.py'
      - 'tests/test_neural_evidence_selector.py'
      - 'tests/test_neural_query_shift.py'
      - 'docs/benchmarks/compression-gauntlet.md'
      - 'docs/benchmarks/compression-frontier.md'
      - 'docs/assets/compression_gauntlet.svg'
      - 'docs/assets/compression_frontier.svg'
      - 'docs/research/prism-r-neural-compression.md'
      - 'README.md'
      - 'pyproject.toml'
      - 'BENCHMARKS.md'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  EVIDENCE_TIKTOKEN_VERSION: "0.9.0"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -e ".[test]" "tiktoken==${EVIDENCE_TIKTOKEN_VERSION}"

      - name: Verify compression evidence artifact
        run: |
          pytest \
            tests/test_compression_gauntlet.py \
            tests/test_compression_frontier.py \
            tests/test_evidence_locked_compression.py \
            tests/test_compression_proxy_scoreboard.py \
            tests/test_neural_evidence_frontier.py \
            tests/test_neural_evidence_selector.py \
            tests/test_neural_query_shift.py \
            -q
          python -m benchmarks.compression_gauntlet verify \
            benchmarks/results/compression_gauntlet.json
          python -m benchmarks.compression_frontier verify \
            benchmarks/results/compression_frontier.json
          python -m benchmarks.neural_evidence_frontier verify \
            benchmarks/results/neural_evidence_frontier.json
          python -m benchmarks.neural_query_shift verify \
            benchmarks/results/neural_query_shift_2x.json
          python -m benchmarks.neural_query_shift verify \
            benchmarks/results/neural_query_shift.json
          python -m benchmarks.neural_query_shift verify \
            benchmarks/results/neural_query_shift_8x.json

      - name: Run competitive benchmark with regression guard
        run: |
          python bench/compare.py \
            --markdown bench_section.md \
            --check-regression \
            | tee bench_output.txt

      - name: Verify BENCHMARKS.md is in sync with code
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys

          doc = Path("BENCHMARKS.md").read_text(encoding="utf-8")
          fresh = Path("bench_section.md").read_text(encoding="utf-8").rstrip()

          start, end = "<!-- BENCH:START -->", "<!-- BENCH:END -->"
          if start not in doc or end not in doc:
              sys.exit("::error::BENCHMARKS.md is missing BENCH sentinels")

          m = re.search(re.escape(start) + r"\n(.*?)\n" + re.escape(end), doc, flags=re.DOTALL)
          committed = m.group(1).rstrip()

          if committed != fresh:
              print("::error::BENCHMARKS.md is stale — regenerate and commit it in this PR.")
              print("Run locally:")
              print("  python bench/compare.py --markdown bench_section.md")
              print("then splice bench_section.md into BENCHMARKS.md between the BENCH sentinels.")
              print()
              print("--- expected (fresh) ---")
              print(fresh)
              print("--- committed ---")
              print(committed)
              sys.exit(1)

          print("BENCHMARKS.md is in sync with bench/compare.py output.")
          PY

      - name: Smoke-test the supported tokenizer ceiling
        run: |
          python -m pip install --upgrade "tiktoken>=0.9,<0.14"
          python - <<'PY'
          from importlib.metadata import version

          import tiktoken

          assert tiktoken.get_encoding("o200k_base").encode("Entroly")
          print(f"tiktoken {version('tiktoken')} compatibility smoke passed")
          PY
