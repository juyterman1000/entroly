name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.entroly'
      - 'entroly/**'
      - 'entroly-core/**'
      - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-geometry-release:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Trigger Entroly 1.0.47 publication')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Synchronize all release surfaces to 1.0.47
        run: |
          python scripts/bump_version.py 1.0.47
          python - <<'PY'
          from pathlib import Path

          path = Path('pyproject.toml')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\n# one-time-release-trigger: 1.0.47\n', '\n')
          text = text.replace('\n# one-time-release-trigger: 1.0.47-pr\n', '\n')
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/release-geometry-1.0.47.yml
          mkdir -p docs/releases
          cat > docs/releases/v1.0.47.md <<'EOF'
          # Entroly 1.0.47

          Entroly 1.0.47 restores the established SimHash/LSH token geometry in
          the Rust deduplication engine. The MD5-derived stable 64-bit geometry
          keeps persisted indexes compatible and prevents matching fragments
          from becoming unreachable after a hash-family change.

          This release synchronizes the Python, native Rust, QCCR, WASM, npm,
          MCP, OpenClaw, plugin, Docker, and registry version surfaces.
          EOF
          git diff --check
          python -m pytest tests/test_bump_version.py tests/test_release_surface.py -q

      - name: Commit synchronized release metadata
        id: release
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add -A
          git commit -m "Release v1.0.47: restore stable SimHash geometry"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch established release pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run entroly-publish.yml --ref main -f release_version=1.0.47

  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.entroly
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
