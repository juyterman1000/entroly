name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.entroly'
      - 'entroly/**'
      - 'entroly-core/**'
      - 'pyproject.toml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-release-1-0-49:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Launch Entroly 1.0.49 release preparation')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Build synchronized release branch
        run: |
          git checkout -B release/1.0.49
          git checkout HEAD^ -- .github/workflows/docker-publish.yml
          sed -i '/^# Release preparation trigger: 1.0.49$/d' pyproject.toml
          python scripts/bump_version.py 1.0.49
          mkdir -p docs/releases
          cat > docs/releases/v1.0.49.md <<'EOF'
          # Entroly 1.0.49

          Entroly 1.0.49 ships replayable Context Commits and the stable
          SimHash/LSH geometry compatibility fix on a fully synchronized release.

          It also repairs the release-wide Python prerelease assertion and the
          commit identity policy for GitHub-reviewed merges, restoring green CI
          across Python 3.10 through 3.14 and the pure-Python fallback.

          All active Python, Rust, QCCR, WASM, npm, MCP, OpenClaw, plugin,
          runtime, lockfile, Homebrew URL, and release-test version surfaces are
          generated together by the canonical bump script.
          EOF
          git rm -f .github/workflows/prepare-release-1.0.49.yml || true
          git diff --check
          python -m pip install pytest
          python -m pytest \
            tests/test_bump_version.py \
            tests/test_release_surface.py \
            tests/test_release_version_sync.py \
            tests/test_native_status.py \
            tests/test_context_commit.py \
            tests/test_context_commit_benchmark.py -q

      - name: Commit release branch
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add -A
          git commit -m "Release v1.0.49: synchronize all release surfaces"
          git push --force-with-lease origin HEAD:release/1.0.49

  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.entroly
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
