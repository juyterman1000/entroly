name: Apply Model Intelligence Architecture

on:
  push:
    branches: [feature/model-intelligence-registry]
    paths:
      - .github/model-intelligence.trigger

permissions:
  contents: write

concurrency:
  group: model-intelligence-integration
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/model-intelligence-registry
          fetch-depth: 0

      - name: Verify and unpack implementation
        run: |
          cat .github/model-intelligence.payload.* | base64 --decode > /tmp/model-intelligence.tar.gz
          echo "592e7879cada865143e3fc9c41a2cc8694b66b890df9622052c48c5f550a6d0d  /tmp/model-intelligence.tar.gz" | sha256sum --check
          tar -xzf /tmp/model-intelligence.tar.gz -C .
          python scripts/apply_model_intelligence.py

      - name: Validate focused architecture
        run: |
          python -m pip install pytest
          python -m py_compile \
            entroly/model_registry.py \
            entroly/model_discovery.py \
            entroly/model_registry_cli.py
          python -m pytest \
            tests/test_model_registry.py \
            tests/test_proxy_model_registry_integration.py -q
          python -m entroly.model_registry_cli resolve gpt-4o-2024-08-06 --json >/tmp/model-resolution.json
          python -m entroly.model_registry_cli resolve gpt-5.6-sol --json >/tmp/unverified-resolution.json
          git diff --check

      - name: Commit clean implementation
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          rm -f \
            .github/model-intelligence.payload.* \
            .github/model-intelligence.trigger \
            .github/workflows/apply-model-intelligence.yml \
            scripts/apply_model_intelligence.py
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add -A
          git commit -m "Add provenance-aware model intelligence registry"
          git push origin HEAD:feature/model-intelligence-registry
