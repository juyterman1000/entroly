name: Sync Homebrew Formula

on:
  workflow_run:
    workflows: ["Build and Push Entroly Docker Image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-homebrew-formula
  cancel-in-progress: true

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve published sdist and update formula
        id: formula
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import pathlib
          import re
          import time
          import urllib.error
          import urllib.request

          root = pathlib.Path('.')
          pyproject = (root / 'pyproject.toml').read_text(encoding='utf-8')
          version_match = re.search(
              r'^version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"',
              pyproject,
              flags=re.MULTILINE,
          )
          if version_match is None:
              raise SystemExit('Could not read the Entroly version from pyproject.toml')
          version = version_match.group(1)

          metadata_url = f'https://pypi.org/pypi/entroly/{version}/json'
          payload = None
          for attempt in range(1, 21):
              try:
                  request = urllib.request.Request(
                      metadata_url,
                      headers={'User-Agent': 'entroly-homebrew-sync'},
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
                  break
              except (urllib.error.HTTPError, urllib.error.URLError, ValueError) as exc:
                  if attempt == 20:
                      raise SystemExit(
                          f'PyPI release entroly {version} did not become available: {exc}'
                      )
                  time.sleep(15)

          sdist = next(
              item for item in payload['urls']
              if item.get('packagetype') == 'sdist'
          )
          request = urllib.request.Request(
              sdist['url'],
              headers={'User-Agent': 'entroly-homebrew-sync'},
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              digest = hashlib.sha256(response.read()).hexdigest()

          formula_path = root / 'packaging/homebrew/entroly.rb'
          formula = formula_path.read_text(encoding='utf-8')
          formula = re.sub(
              r'entroly-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz',
              f'entroly-{version}.tar.gz',
              formula,
          )
          formula, sha_count = re.subn(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{digest}"',
              formula,
              count=1,
          )
          if sha_count != 1:
              raise SystemExit('Could not update the Homebrew sha256')
          formula_path.write_text(formula, encoding='utf-8')

          release_test_path = root / 'tests/test_release_surface.py'
          release_test = release_test_path.read_text(encoding='utf-8')
          release_test, test_count = re.subn(
              r'assert "[0-9a-f]{64}" in text',
              f'assert "{digest}" in text',
              release_test,
              count=1,
          )
          if test_count != 1:
              raise SystemExit('Could not update the release checksum assertion')
          release_test_path.write_text(release_test, encoding='utf-8')

          print(f'Entroly {version} sdist sha256: {digest}')
          with open('homebrew-sync.env', 'w', encoding='utf-8') as output:
              output.write(f'VERSION={version}\nSHA256={digest}\n')
          PY

          cat homebrew-sync.env >> "$GITHUB_OUTPUT"
          rm homebrew-sync.env
          git diff --check

      - name: Commit synchronized checksum
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          if git diff --quiet -- packaging/homebrew/entroly.rb tests/test_release_surface.py; then
            echo "Homebrew formula already matches Entroly ${{ steps.formula.outputs.VERSION }}."
            exit 0
          fi
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add packaging/homebrew/entroly.rb tests/test_release_surface.py
          git commit -m "Update Homebrew digest for ${{ steps.formula.outputs.VERSION }}"
          git push origin HEAD:main
