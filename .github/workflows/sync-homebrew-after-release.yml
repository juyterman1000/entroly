name: Synchronize Homebrew After Release

on:
  workflow_run:
    workflows:
      - Build and Push Entroly Docker Image
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: sync-homebrew-main
  cancel-in-progress: false

jobs:
  synchronize:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve published sdist checksum
        id: release
        shell: python
        run: |
          import hashlib
          import json
          import os
          import pathlib
          import re
          import tomllib
          import urllib.error
          import urllib.request

          root = pathlib.Path('.')
          version = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          endpoint = f'https://pypi.org/pypi/entroly/{version}/json'

          try:
              with urllib.request.urlopen(endpoint, timeout=30) as response:
                  payload = json.load(response)
          except (OSError, urllib.error.HTTPError, urllib.error.URLError) as exc:
              print(f'PyPI release {version} is not available yet: {exc}')
              raise SystemExit(0)

          sdists = [item for item in payload.get('urls', []) if item.get('packagetype') == 'sdist']
          if len(sdists) != 1:
              raise SystemExit(f'expected exactly one sdist for {version}, found {len(sdists)}')
          sha256 = sdists[0].get('digests', {}).get('sha256', '')
          if not re.fullmatch(r'[0-9a-f]{64}', sha256):
              raise SystemExit(f'invalid PyPI sdist checksum for {version}: {sha256!r}')

          formula_path = root / 'packaging' / 'homebrew' / 'entroly.rb'
          formula = formula_path.read_text(encoding='utf-8')
          formula = re.sub(
              r'url "https://files\.pythonhosted\.org/packages/source/e/entroly/entroly-[^"]+\.tar\.gz"',
              f'url "https://files.pythonhosted.org/packages/source/e/entroly/entroly-{version}.tar.gz"',
              formula,
          )
          formula = re.sub(r'sha256 "[0-9a-f]{64}"', f'sha256 "{sha256}"', formula, count=1)
          formula_path.write_text(formula, encoding='utf-8')

          test_path = root / 'tests' / 'test_release_surface.py'
          test_text = test_path.read_text(encoding='utf-8')
          test_text = re.sub(
              r'assert "[0-9a-f]{64}" in text',
              f'assert "{sha256}" in text',
              test_text,
              count=1,
          )
          test_path.write_text(test_text, encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'version={version}\nsha256={sha256}\n')
          print(f'Homebrew metadata synchronized for {version}: {sha256}')

      - name: Validate release surface
        if: steps.release.outputs.sha256 != ''
        run: |
          python -m pip install pytest
          python -m pytest tests/test_release_surface.py -q

      - name: Commit Homebrew checksum
        if: steps.release.outputs.sha256 != ''
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Homebrew checksum is already current."
            exit 0
          fi
          git config user.name "juyterman1000"
          git config user.email "208309368+juyterman1000@users.noreply.github.com"
          git add packaging/homebrew/entroly.rb tests/test_release_surface.py
          git commit -m "Update Homebrew formula for ${{ steps.release.outputs.version }}"
          git push origin HEAD:main
