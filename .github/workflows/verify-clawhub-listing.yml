name: Verify Entroly ClawHub Listing

on:
  workflow_run:
    workflows: ["Build and Push Entroly Docker Image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: verify-entroly-clawhub
  cancel-in-progress: true

jobs:
  verify:
    if: >-
      github.repository == 'juyterman1000/entroly' &&
      (
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_repository.full_name == 'juyterman1000/entroly' &&
          github.event.workflow_run.actor.login == 'juyterman1000'
        ) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          persist-credentials: false

      - name: Verify exact public package, search result, and artifact
        id: verify
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import pathlib
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          package_name = "entroly-openclaw"
          package_owner = "juyterman1000"
          public_url = f"https://clawhub.ai/{package_owner}/plugins/{package_name}"
          expected_version = json.loads(
              pathlib.Path("integrations/openclaw/package.json").read_text(encoding="utf-8")
          )["version"]
          base = "https://clawhub.ai/api/v1"
          headers = {"User-Agent": "entroly-clawhub-verifier/1.0"}
          last_error = "ClawHub listing did not become publicly verifiable"

          def read_json(url: str) -> dict:
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status != 200:
                      raise RuntimeError(f"HTTP {response.status} for {url}")
                  return json.load(response)

          for attempt in range(1, 41):
              try:
                  detail = read_json(
                      f"{base}/packages/{urllib.parse.quote(package_name, safe='')}"
                  )
                  package = detail.get("package") or {}
                  if package.get("name") != package_name:
                      raise RuntimeError(f"unexpected package identity: {package.get('name')!r}")
                  if package.get("family") != "code-plugin":
                      raise RuntimeError(f"unexpected package family: {package.get('family')!r}")
                  if package.get("latestVersion") != expected_version:
                      raise RuntimeError(
                          f"latest version is {package.get('latestVersion')!r}, "
                          f"expected {expected_version!r}"
                      )

                  version = read_json(
                      f"{base}/packages/{urllib.parse.quote(package_name, safe='')}"
                      f"/versions/{urllib.parse.quote(expected_version, safe='')}"
                  )
                  version_payload = version.get("version") or {}
                  if version_payload.get("version") != expected_version:
                      raise RuntimeError("exact public version is unavailable")
                  artifact = version_payload.get("artifact") or {}
                  if not artifact.get("sha256"):
                      raise RuntimeError("public release artifact is not downloadable yet")

                  search = read_json(
                      f"{base}/plugins/search?q="
                      + urllib.parse.quote(package_name, safe="")
                      + "&limit=20"
                  )
                  names = {
                      (entry.get("package") or {}).get("name")
                      for entry in search.get("results", [])
                  }
                  if package_name not in names:
                      raise RuntimeError("package exists but is not discoverable in plugin search yet")

                  result = {
                      "package": package_name,
                      "version": expected_version,
                      "family": package.get("family"),
                      "channel": package.get("channel"),
                      "scan_status": package.get("scanStatus"),
                      "verification_tier": (package.get("verification") or {}).get("tier"),
                      "artifact_sha256": artifact.get("sha256"),
                      "public_url": public_url,
                  }
                  pathlib.Path("clawhub-verification.json").write_text(
                      json.dumps(result, indent=2, sort_keys=True) + "\n",
                      encoding="utf-8",
                  )
                  print(json.dumps(result, indent=2, sort_keys=True))
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                      output.write("state=success\n")
                      output.write(f"description=ClawHub {package_name} {expected_version} is public\n")
                      output.write(f"target_url={public_url}\n")
                  raise SystemExit(0)
              except (urllib.error.HTTPError, urllib.error.URLError, ValueError, RuntimeError) as exc:
                  last_error = str(exc)
                  print(f"Attempt {attempt}/40: {last_error}")
                  if attempt < 40:
                      time.sleep(15)

          safe_error = " ".join(last_error.split())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("state=failure\n")
              output.write(
                  f"description=ClawHub {expected_version} unavailable: {safe_error}\n"
              )
              output.write(f"target_url={public_url}\n")
          pathlib.Path("clawhub-verification-error.txt").write_text(
              last_error + "\n", encoding="utf-8"
          )
          PY

      - name: Record public verification status
        if: always()
        uses: actions/github-script@v9
        env:
          CLAWHUB_STATE: ${{ steps.verify.outputs.state }}
          CLAWHUB_DESCRIPTION: ${{ steps.verify.outputs.description }}
          CLAWHUB_TARGET_URL: ${{ steps.verify.outputs.target_url }}
        with:
          script: |
            const state = process.env.CLAWHUB_STATE || 'failure';
            const description = process.env.CLAWHUB_DESCRIPTION || 'ClawHub verification did not complete';
            const targetUrl = process.env.CLAWHUB_TARGET_URL || 'https://clawhub.ai/juyterman1000/plugins/entroly-openclaw';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SOURCE_SHA,
              state,
              context: 'ClawHub Public Listing',
              description: description.slice(0, 140),
              target_url: targetUrl,
            });
            if (state !== 'success') {
              core.setFailed(description);
            }

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clawhub-public-verification
          path: |
            clawhub-verification.json
            clawhub-verification-error.txt
          if-no-files-found: ignore
