name: Release Entroly 1.0.47 Geometry Fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-geometry-1.0.47.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: release-entroly-1.0.47
  cancel-in-progress: false

jobs:
  prepare-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Bump every release surface
        run: |
          python scripts/bump_version.py 1.0.47
          mkdir -p docs/releases
          cat > docs/releases/v1.0.47.md <<'EOF'
          # Entroly 1.0.47

          This patch release ships the stable SimHash/LSH geometry restoration.

          The Rust deduplication engine again uses the established MD5-derived
          64-bit token geometry. This preserves compatibility with persisted
          SimHash/LSH indexes and prevents semantically matching fragments from
          becoming unreachable after a hash-family change.

          The release also synchronizes Python, Rust, WASM, npm, MCP, plugin,
          native-engine, and registry version surfaces.
          EOF
          git diff --check

      - name: Validate synchronized metadata
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          root = pathlib.Path('.')
          version = '1.0.47'
          json_files = [
              '.claude-plugin/manifest.json',
              '.mcpb-build/manifest.json',
              'entroly-wasm/package.json',
              'entroly/npm/package.json',
              'entroly/npm-alias/package.json',
              'integrations/openclaw/package.json',
              'server.json',
          ]
          for rel in json_files:
              data = json.loads((root / rel).read_text(encoding='utf-8'))
              if data.get('version') != version:
                  raise SystemExit(f'{rel}: expected version {version}, got {data.get("version")}')

          server = json.loads((root / 'server.json').read_text(encoding='utf-8'))
          for package in server['packages']:
              if package['version'] != version:
                  raise SystemExit(f"server.json package {package['identifier']} is not {version}")

          for rel in ('pyproject.toml', 'entroly/pyproject.toml'):
              text = (root / rel).read_text(encoding='utf-8')
              if f'version = "{version}"' not in text:
                  raise SystemExit(f'{rel}: project version is not {version}')
              if f'entroly-core>={version},<2' not in text:
                  raise SystemExit(f'{rel}: native dependency is not {version}')

          release_test = (root / 'tests/test_release_surface.py').read_text(encoding='utf-8')
          if 'RELEASE_VERSION = "1.0.47"' not in release_test:
              raise SystemExit('release surface test was not bumped')
          if not re.search(r'def test_public_package_versions_are_1_0_47\(\)', release_test):
              raise SystemExit('release surface test name was not bumped')
          PY

      - name: Commit the synchronized release
        id: release_commit
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git rm .github/workflows/release-geometry-1.0.47.yml
          git add -A
          git commit -m "Release v1.0.47: restore stable SimHash geometry"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch the existing release pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
        run: |
          gh workflow run docker-publish.yml --ref main -f release_version=1.0.47

          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID=$(gh run list \
              --workflow docker-publish.yml \
              --event workflow_dispatch \
              --branch main \
              --limit 30 \
              --json databaseId,headSha,createdAt \
              --jq '.[] | select(.headSha == env.RELEASE_SHA) | .databaseId' \
              | head -n 1)
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "Could not locate the dispatched release run for $RELEASE_SHA" >&2
            exit 1
          fi

          echo "Watching release workflow run $RUN_ID"
          gh run watch "$RUN_ID" --exit-status --interval 30

      - name: Pin the real Homebrew sdist checksum
        env:
          GIT_AUTHOR_NAME: juyterman1000
          GIT_AUTHOR_EMAIL: fastrunner10090@gmail.com
          GIT_COMMITTER_NAME: juyterman1000
          GIT_COMMITTER_EMAIL: fastrunner10090@gmail.com
        run: |
          git fetch origin main
          git reset --hard origin/main

          python - <<'PY'
          import hashlib
          import json
          import pathlib
          import re
          import time
          import urllib.error
          import urllib.request

          version = '1.0.47'
          metadata_url = f'https://pypi.org/pypi/entroly/{version}/json'
          payload = None
          for attempt in range(1, 21):
              try:
                  request = urllib.request.Request(
                      metadata_url,
                      headers={'User-Agent': 'entroly-release-checksum'},
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
                  break
              except (urllib.error.URLError, urllib.error.HTTPError, ValueError) as exc:
                  if attempt == 20:
                      raise SystemExit(f'PyPI metadata did not become available: {exc}')
                  time.sleep(15)

          sdist = next(
              item for item in payload['urls']
              if item.get('packagetype') == 'sdist'
          )
          with urllib.request.urlopen(sdist['url'], timeout=60) as response:
              digest = hashlib.sha256(response.read()).hexdigest()

          formula_path = pathlib.Path('packaging/homebrew/entroly.rb')
          formula = formula_path.read_text(encoding='utf-8')
          formula = re.sub(
              r'entroly-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz',
              f'entroly-{version}.tar.gz',
              formula,
          )
          formula, count = re.subn(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{digest}"',
              formula,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not update Homebrew sha256')
          formula_path.write_text(formula, encoding='utf-8')

          test_path = pathlib.Path('tests/test_release_surface.py')
          test_text = test_path.read_text(encoding='utf-8')
          test_text, count = re.subn(
              r'assert "[0-9a-f]{64}" in text',
              f'assert "{digest}" in text',
              test_text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not update release-surface checksum assertion')
          test_path.write_text(test_text, encoding='utf-8')

          print(f'Pinned PyPI sdist sha256: {digest}')
          PY

          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add packaging/homebrew/entroly.rb tests/test_release_surface.py
          git diff --cached --check
          git commit -m "Update Homebrew digest for 1.0.47"
          git push origin HEAD:main
