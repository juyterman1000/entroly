name: Publish entroly-core wheels to PyPI

# Builds native Python wheels and publishes to PyPI on release tags.
# Uses direct maturin shell commands (not maturin-action) to avoid the
# repo-root pyproject.toml / build-backend confusion.

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - name: Build manylinux wheel
        run: |
          source $HOME/.cargo/env
          pip3 install maturin
          cd entroly-core
          maturin build --release --out ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  build-macos:
    name: Build wheels (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: |
          pip3 install maturin
          cd entroly-core
          maturin build --release --out ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  build-windows:
    name: Build wheels (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        shell: bash
        run: |
          pip install maturin
          cd entroly-core
          maturin build --release --out ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  publish-to-pypi:
    name: Publish entroly-core to PyPI
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
