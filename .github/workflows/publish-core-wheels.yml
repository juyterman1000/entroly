name: Publish entroly-core wheels to PyPI

# Builds native Python wheels and publishes to PyPI on release tags.
# Linux x86_64 and Windows x86_64 are required; macOS is best-effort.

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: auto
          target: x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist

  macos:
    name: macOS (arm64)
    runs-on: macos-latest
    continue-on-error: true   # best-effort; don't block publishing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: |
          pipx run maturin build --release --out dist
        working-directory: entroly-core
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: wheels-macos
          path: entroly-core/dist

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        shell: bash
        run: |
          pip install maturin
          cd entroly-core && maturin build --release --out ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  publish:
    name: Publish to PyPI
    # Only requires linux and windows (proven); macOS is continue-on-error above
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          password: ${{ secrets.PYPI_TOKEN }}
