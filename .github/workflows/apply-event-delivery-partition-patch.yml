name: Apply Event Delivery Partition Patch

on:
  push:
    branches:
      - breakthrough/reliable-event-delivery
    paths:
      - scripts/apply_event_delivery_partition_patch.py
      - .github/workflows/apply-event-delivery-partition-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: breakthrough/reliable-event-delivery
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/apply_event_delivery_partition_patch.py
      - run: python -m py_compile entroly/integrations/event_delivery.py
      - name: Commit partition fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name juyterman1000
          git config user.email fastrunner10090@gmail.com
          git add entroly/integrations/event_delivery.py
          git commit -m "Partition durable delivery claims by destination"
          git push origin HEAD:breakthrough/reliable-event-delivery
