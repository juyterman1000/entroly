name: Commit Identity Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commit-identity:
    name: Commit Identity Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify commit author and committer
        env:
          EXPECTED_LOGIN: juyterman1000
          EXPECTED_NOREPLY_EMAIL: 208309368+juyterman1000@users.noreply.github.com
          EXPECTED_ACCOUNT_EMAIL: fastrunner10090@gmail.com
        run: |
          python - <<'PY'
          import json, os, re, subprocess, sys
          from pathlib import Path

          expected_login = os.environ["EXPECTED_LOGIN"]
          owner_emails = {
              os.environ["EXPECTED_NOREPLY_EMAIL"],
              os.environ["EXPECTED_ACCOUNT_EMAIL"],
          }
          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          event_name = os.environ["GITHUB_EVENT_NAME"]

          if event_name == "pull_request":
              rev = f'{event["pull_request"]["base"]["sha"]}..{event["pull_request"]["head"]["sha"]}'
          else:
              before = event.get("before", "")
              after = event["after"]
              rev = after if not before or set(before) == {"0"} else f"{before}..{after}"

          rows = subprocess.check_output(
              [
                  "git",
                  "log",
                  "--first-parent",
                  "--format=%H%x1f%an%x1f%ae%x1f%cn%x1f%ce%x1e",
                  rev,
              ],
              text=True,
          )

          def owner_identity(_name: str, email: str) -> bool:
              # GitHub may preserve a user-configured display name, but commits
              # associated with the repository owner use one of these verified
              # addresses and render in GitHub as juyterman1000.
              return email in owner_emails

          def github_service_committer(name: str, email: str) -> bool:
              return name in {"GitHub", "web-flow"} and (
                  email == "noreply@github.com"
                  or email.endswith("+web-flow@users.noreply.github.com")
              )

          def git_output(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True)

          def changed_paths(commit: str) -> set[str]:
              return set(
                  git_output(
                      "diff-tree", "--no-commit-id", "--name-only", "-r", commit
                  ).splitlines()
              )

          def dependency_path(path: str) -> bool:
              dependency_files = {
                  "Cargo.lock",
                  "Cargo.toml",
                  "Pipfile",
                  "Pipfile.lock",
                  "go.mod",
                  "go.sum",
                  "package-lock.json",
                  "package.json",
                  "pnpm-lock.yaml",
                  "poetry.lock",
                  "pyproject.toml",
                  "requirements-dev.txt",
                  "requirements.txt",
                  "uv.lock",
                  "yarn.lock",
              }
              name = Path(path).name
              return (
                  name in dependency_files
                  or name.startswith("requirements")
                  and name.endswith(".txt")
                  or path.startswith(".github/workflows/")
                  and Path(path).suffix in {".yml", ".yaml"}
                  or path == ".github/dependabot.yml"
              )

          def trusted_dependabot_author(
              commit: str,
              author_name: str,
              author_email: str,
              committer_name: str,
              committer_email: str,
          ) -> bool:
              if (
                  author_name != "dependabot[bot]"
                  or author_email
                  != "49699333+dependabot[bot]@users.noreply.github.com"
                  or not github_service_committer(committer_name, committer_email)
              ):
                  return False

              paths = changed_paths(commit)
              if not paths or not all(dependency_path(path) for path in paths):
                  return False

              if event_name == "pull_request":
                  pull_request = event.get("pull_request", {})
                  head = pull_request.get("head", {})
                  head_repository = head.get("repo") or {}
                  return (
                      (pull_request.get("user") or {}).get("login")
                      == "dependabot[bot]"
                      and str(head.get("ref", "")).startswith("dependabot/")
                      and head_repository.get("full_name")
                      == os.environ["GITHUB_REPOSITORY"]
                  )

              if event_name != "push" or event.get("ref") != "refs/heads/main":
                  return False
              if event.get("sender", {}).get("login") != expected_login:
                  return False
              subject = git_output("show", "-s", "--format=%s", commit).strip()
              return bool(
                  re.fullmatch(
                      r"(?:build\(deps(?:-[^)]+)?\): (?:bump|update)|Bump|Update) "
                      r".+ \(#\d+\)",
                      subject,
                      re.IGNORECASE,
                  )
              )

          def trusted_homebrew_automation_author(
              commit: str,
              author_name: str,
              author_email: str,
              committer_name: str,
              committer_email: str,
          ) -> bool:
              # A release workflow opens the Homebrew PR with GITHUB_TOKEN.
              # GitHub attributes the resulting squash commit to its Actions
              # bot even though the owner reviewed and merged it. Keep this
              # exception narrow enough that it cannot authorize general bot
              # commits or hide unrelated release changes.
              if event_name != "push" or event.get("ref") != "refs/heads/main":
                  return False
              if event.get("sender", {}).get("login") != expected_login:
                  return False
              if (
                  author_name != "github-actions[bot]"
                  or author_email
                  != "41898282+github-actions[bot]@users.noreply.github.com"
                  or not github_service_committer(committer_name, committer_email)
              ):
                  return False

              parents = git_output("rev-list", "--parents", "-n", "1", commit).split()
              if len(parents) != 2:
                  return False

              message = git_output("show", "-s", "--format=%B", commit)
              lines = message.splitlines()
              if not lines:
                  return False
              subject_match = re.fullmatch(
                  r"Update Homebrew formula for (\d+\.\d+\.\d+) \(#\d+\)",
                  lines[0],
              )
              if not subject_match:
                  return False
              coauthor_emails = {
                  match.group(1)
                  for line in lines[1:]
                  if (
                      match := re.fullmatch(
                          r"Co-authored-by: .+ <([^<>]+)>", line, re.IGNORECASE
                      )
                  )
              }
              if owner_emails.isdisjoint(coauthor_emails):
                  return False

              if changed_paths(commit) != {
                  "packaging/homebrew/entroly.rb",
                  "tests/test_release_surface.py",
              }:
                  return False

              version = subject_match.group(1)
              formula = git_output(
                  "show", f"{commit}:packaging/homebrew/entroly.rb"
              )
              release_test = git_output(
                  "show", f"{commit}:tests/test_release_surface.py"
              )
              formula_sha = re.search(
                  r'^\s*sha256 "([0-9a-f]{64})"$', formula, re.MULTILINE
              )
              test_sha = re.search(
                  r'^HOMEBREW_FORMULA_SHA256 = "([0-9a-f]{64})"$',
                  release_test,
                  re.MULTILINE,
              )
              return bool(
                  f"entroly-{version}.tar.gz" in formula
                  and f'HOMEBREW_FORMULA_VERSION = "{version}"' in release_test
                  and formula_sha
                  and test_sha
                  and formula_sha.group(1) == test_sha.group(1)
              )

          failures = []
          for row in rows.split("\x1e"):
              row = row.strip("\r\n")
              if not row:
                  continue
              commit, an, ae, cn, ce = row.split("\x1f")
              if (
                  not owner_identity(an, ae)
                  and not trusted_dependabot_author(commit, an, ae, cn, ce)
                  and not trusted_homebrew_automation_author(
                      commit, an, ae, cn, ce
                  )
              ):
                  failures.append(f"{commit[:12]} author is {an} <{ae}>")
              if not owner_identity(cn, ce) and not github_service_committer(cn, ce):
                  failures.append(f"{commit[:12]} committer is {cn} <{ce}>")

          if failures:
              print("Commit identity guard failed.")
              print(f"Required author account: {expected_login} via a verified owner email")
              print(
                  "Allowed automation: path-scoped Dependabot PRs and reviewed "
                  "Homebrew release updates"
              )
              print("Allowed committers: the owner account or GitHub's web-flow service identity")
              for failure in failures:
                  print(f"  - {failure}")
              sys.exit(1)

          print(f"Commit identity OK for {rev}")
          PY
